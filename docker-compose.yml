---
x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: 4
      compress: "true"
      mode: non-blocking
      max-buffer-size: 4m

services:
  init-perms:
    image: busybox
    restart: "no"
    command: chown -R 10001:10001 /data
    volumes:
      - tempstream_data:/data

  tempstream:
    <<: *common
    image: ghcr.io/hu553in/tempstream
    user: "10001:10001"
    env_file:
      - .env
    depends_on:
      init-perms:
        condition: service_completed_successfully
      mediamtx:
        condition: service_started
    volumes:
      - tempstream_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  mediamtx:
    <<: *common
    image: bluenviron/mediamtx
    environment:
      MTX_AUTHINTERNALUSERS_1_USER: ${MEDIAMTX_PUBLISH_USER:?}
      MTX_AUTHINTERNALUSERS_1_PASS: ${MEDIAMTX_PUBLISH_PASSWORD:?}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "1935:1935"
      - "8888:8888"

  caddy:
    <<: *common
    image: caddy
    depends_on:
      tempstream:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  tempstream_data:
  caddy_data:
  caddy_config:
