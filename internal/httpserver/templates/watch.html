<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live stream</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 960px;
      height: calc(100dvh - 32px);
      max-height: calc(100dvh - 32px);
      background: #18181b;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 24px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 auto;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .header p {
      font-size: 0.8125rem;
      color: #a1a1aa;
      line-height: 1.5;
    }

    .player-wrap {
      padding: 0 12px 12px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #player {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      background: #000;
      border-radius: 10px;
    }

    #error {
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.2);
      color: #fca5a5;
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #error[hidden] {
      display: none;
    }

    @media (min-width: 640px) {
      body {
        padding: 24px;
      }

      .card {
        height: calc(100dvh - 48px);
        max-height: calc(100dvh - 48px);
      }

      .header {
        padding: 32px 32px 20px;
        gap: 12px;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .player-wrap {
        padding: 0 16px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>Live stream</h1>
      <p>
        If something goes wrong, refresh and try again.
        Playback stops if the link is disabled or expires.
      </p>
      <div id="error" hidden></div>
    </div>

    <div class="player-wrap">
      <video id="player" controls autoplay playsinline muted></video>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
  <script>
    (() => {
      const video = document.getElementById("player");
      const errorBox = document.getElementById("error");
      const playlistUrl = "{{ .PlaylistURL | js }}";

      let statusProbeTimer = null;

      const tryPlay = () => {
        video.play().catch(() => {});
      };

      const showError = (text) => {
        errorBox.hidden = false;
        errorBox.textContent = text;
      };

      const clearError = () => {
        errorBox.hidden = true;
        errorBox.textContent = "";
      };

      const stopStatusProbe = () => {
        if (statusProbeTimer === null) {
          return;
        }

        clearInterval(statusProbeTimer);
        statusProbeTimer = null;
      };

      const probePlaylistStatus = async () => {
        try {
          const response = await fetch(playlistUrl, {
            method: "GET",
            cache: "no-store",
            credentials: "same-origin",
          });

          if (response.status === 403 || response.status === 404) {
            stopStatusProbe();
            showError("This link has been disabled or expired.");
            return;
          }

          if (response.ok) {
            clearError();
          }
        } catch {
          // Ignore transient network failures here.
        }
      };

      const startStatusProbe = () => {
        if (statusProbeTimer !== null) {
          return;
        }

        statusProbeTimer = setInterval(() => {
          void probePlaylistStatus();
        }, 5000);
      };

      const playNative = () => {
        video.src = playlistUrl;
        video.addEventListener("loadedmetadata", tryPlay, { once: true });
      };

      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        clearError();
        startStatusProbe();
        playNative();
        return;
      }

      if (window.Hls && window.Hls.isSupported()) {
        const hls = new Hls({
          lowLatencyMode: true,
          backBufferLength: 30,
        });

        hls.loadSource(playlistUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          clearError();
          startStatusProbe();
          tryPlay();
        });

        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (!data || !data.fatal) {
            return;
          }

          void probePlaylistStatus().finally(() => {
            if (errorBox.hidden) {
              showError(
                "Failed to load the stream. The link may be expired, " +
                  "disabled, or the stream may be offline.",
              );
            }
          });
        });

        return;
      }

      showError(
        "This browser does not support HLS playback. " +
          "Try opening the link in Safari, Chrome, or Edge.",
      );
    })();
  </script>
</body>
</html>
